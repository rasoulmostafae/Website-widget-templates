<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Pulse Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }

    .neon-glow {
      box-shadow: 0 0 30px #22d3ee,
                  0 0 60px #a855f7;
    }

    .chat-widget {
      border: 1px solid rgba(34, 211, 238, 0.3);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(20px);
    }

    .message {
      animation: neonPop 0.4s ease-out forwards;
    }

    @keyframes neonPop {
      0% { opacity: 0; transform: translateY(25px) scale(0.85); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }

    .scanline {
      position: relative;
    }
    .scanline::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(transparent, rgba(255,255,255,0.03), transparent);
      animation: scan 4s linear infinite;
      pointer-events: none;
    }

    @keyframes scan {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(300%); }
    }
  </style>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center overflow-hidden">

  <!-- Neon Floating Button -->
  <button id="chat-toggle"
    class="fixed bottom-8 right-8 w-16 h-16 bg-black border-2 border-cyan-400 rounded-2xl flex items-center justify-center neon-glow hover:scale-110 active:scale-95 transition-all duration-300 z-50">
    <i class="fa-solid fa-bolt text-cyan-400 text-3xl"></i>
  </button>

  <!-- Chat Widget -->
  <div id="chat-widget" class="hidden fixed bottom-28 right-8 w-96 chat-widget rounded-3xl overflow-hidden neon-glow">

    <!-- Header -->
    <div class="bg-gradient-to-r from-cyan-500 via-purple-600 to-pink-500 p-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-black rounded-2xl flex items-center justify-center border border-cyan-300">
          <i class="fa-solid fa-circuit-board text-cyan-300 text-2xl"></i>
        </div>
        <div>
          <h3 class="text-white font-bold text-xl tracking-wider">NEXUS</h3>
          <p class="text-cyan-200 text-xs flex items-center gap-2">
            <span class="relative flex h-2 w-2">
              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
              <span class="relative inline-flex rounded-full h-2 w-2 bg-cyan-400"></span>
            </span>
            ONLINE • NEURAL LINK ACTIVE
          </p>
        </div>
      </div>
      <button id="close-chat" class="text-white/70 hover:text-white p-2 rounded-xl hover:bg-white/10 transition-colors">
        <i class="fa-solid fa-power-off text-xl"></i>
      </button>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="h-96 p-6 overflow-y-auto space-y-5 scanline bg-zinc-950/90 scrollbar-thin scrollbar-thumb-cyan-900">
      <!-- Messages injected by JS -->
    </div>

    <!-- Input -->
    <div class="p-5 border-t border-cyan-900/50 bg-zinc-950">
      <div class="flex gap-3">
        <input 
          id="user-input"
          type="text" 
          placeholder="ENTER TRANSMISSION..." 
          class="flex-1 bg-zinc-900 border border-cyan-800 focus:border-purple-500 text-cyan-100 placeholder-zinc-500 rounded-2xl px-5 py-4 focus:outline-none font-mono text-sm transition-all"
        />
        <button id="send-btn"
          class="px-6 bg-gradient-to-r from-cyan-400 to-purple-500 text-black font-semibold rounded-2xl hover:brightness-110 active:scale-95 transition-all flex items-center justify-center">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const widget = document.getElementById('chat-widget');
    const closeBtn = document.getElementById('close-chat');
    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addWelcomeMessage() {
      const welcome = `
        <div class="flex gap-4 message">
          <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center flex-shrink-0 border border-cyan-300">
            <i class="fa-solid fa-circuit-board text-black"></i>
          </div>
          <div class="bg-zinc-900 border border-cyan-800 rounded-3xl rounded-tl-none px-5 py-4 text-cyan-100 max-w-[260px]">
            Neural connection established.<br>
            Hello, Operator. What protocol shall we run today?
          </div>
        </div>
      `;
      messagesContainer.innerHTML = welcome;
    }

    function addMessage(text, isUser) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const html = `
        <div class="flex ${isUser ? 'justify-end' : 'gap-4'} message">
          ${!isUser ? `
          <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-2xl flex items-center justify-center flex-shrink-0 border border-cyan-300">
            <i class="fa-solid fa-circuit-board text-black"></i>
          </div>` : ''}
          
          <div class="${isUser ? 'max-w-[250px]' : 'max-w-[260px]'}">
            <div class="${isUser 
              ? 'bg-gradient-to-r from-purple-600 to-pink-600 text-white' 
              : 'bg-zinc-900 border border-cyan-800 text-cyan-100'} 
              rounded-3xl ${isUser ? 'rounded-br-none' : 'rounded-tl-none'} px-5 py-4">
              ${text}
            </div>
            <p class="text-[10px] text-cyan-700 mt-1 ${isUser ? 'text-right' : 'ml-2'}">${time}</p>
          </div>
        </div>
      `;

      messagesContainer.insertAdjacentHTML('beforeend', html);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function toggleChat() {
      widget.classList.toggle('hidden');
      if (!widget.classList.contains('hidden') && messagesContainer.children.length === 0) {
        addWelcomeMessage();
        input.focus();
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        const cyberReplies = [
          "SIGNAL RECEIVED ✓",
          "Processing through neural net...",
          "Quantum response initialized.",
          "Accessing mainframe archives...",
          "Decrypting emotional data..."
        ];
        addMessage(cyberReplies[Math.floor(Math.random() * cyberReplies.length)], false);
      }, 600);
    }

    // Events
    toggleBtn.addEventListener('click', toggleChat);
    closeBtn.addEventListener('click', toggleChat);
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
