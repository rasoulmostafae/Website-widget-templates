<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>codzar Glow Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }

    .chat-widget {
      box-shadow: 0 30px 70px -20px rgba(249, 115, 22, 0.4);
    }

    .sunset-header {
      background: linear-gradient(135deg, #f97316, #ec4899, #db2777);
    }

    .message {
      animation: warmPop 0.5s ease-out forwards;
    }

    @keyframes warmPop {
      0% { opacity: 0; transform: scale(0.85) translateY(15px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-orange-950 via-amber-950 to-pink-950 min-h-screen flex items-center justify-center">

  <!-- Floating Button -->
  <button id="chat-toggle"
    class="fixed bottom-8 right-8 w-16 h-16 bg-gradient-to-br from-orange-400 to-pink-500 rounded-3xl flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all duration-300 z-50">
    <i class="fa-solid fa-sun text-white text-3xl drop-shadow-md"></i>
  </button>

  <!-- Chat Widget -->
  <div id="chat-widget" class="hidden fixed bottom-28 right-8 w-96 bg-white/95 backdrop-blur-xl rounded-3xl overflow-hidden chat-widget border border-orange-200">

    <!-- Header -->
    <div class="sunset-header p-6 text-white">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-white/20 backdrop-blur-md rounded-3xl flex items-center justify-center border border-white/30">
            <i class="fa-solid fa-sun text-3xl"></i>
          </div>
          <div>
            <h3 class="font-semibold text-2xl tracking-tight">Codzar</h3>
            <p class="text-orange-100 text-sm flex items-center gap-2">
              <span class="w-3 h-3 bg-yellow-300 rounded-full animate-pulse"></span>
              Golden hour vibes only
            </p>
          </div>
        </div>
        <button id="close-chat" class="text-white/80 hover:text-white p-3 rounded-2xl hover:bg-white/10 transition-all">
          <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="h-96 p-7 overflow-y-auto bg-gradient-to-b from-amber-50 to-orange-50 space-y-6 scrollbar-thin scrollbar-thumb-orange-300">
      <!-- JS messages here -->
    </div>

    <!-- Input Area -->
    <div class="p-6 bg-white border-t border-orange-100">
      <div class="flex gap-3">
        <input 
          id="user-input"
          type="text" 
          placeholder="What’s on your mind as the sun sets?" 
          class="flex-1 bg-amber-50 border border-orange-200 focus:border-orange-400 rounded-3xl px-6 py-4 text-gray-700 placeholder-gray-400 focus:outline-none transition-all"
        />
        <button id="send-btn"
          class="w-14 h-14 bg-gradient-to-br from-orange-400 to-pink-500 rounded-3xl flex items-center justify-center text-white hover:scale-110 transition-all shadow-lg">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const widget = document.getElementById('chat-widget');
    const closeBtn = document.getElementById('close-chat');
    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addWelcomeMessage() {
      const welcome = `
        <div class="flex gap-4 message">
          <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-pink-500 rounded-3xl flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-sun text-white"></i>
          </div>
          <div class="bg-white rounded-3xl rounded-tl-none px-6 py-4 text-gray-700 max-w-[270px] shadow-sm">
            Hey there... 🌅<br>
            The sky is painting itself just for us.<br>
            What’s warming your heart today?
          </div>
        </div>
      `;
      messagesContainer.innerHTML = welcome;
    }

    function addMessage(text, isUser) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const html = `
        <div class="flex ${isUser ? 'justify-end' : 'gap-4'} message">
          ${!isUser ? `
          <div class="w-10 h-10 bg-gradient-to-br from-orange-400 to-pink-500 rounded-3xl flex items-center justify-center flex-shrink-0">
            <i class="fa-solid fa-sun text-white"></i>
          </div>` : ''}
          
          <div class="${isUser ? 'max-w-[260px]' : 'max-w-[270px]'}">
            <div class="${isUser 
              ? 'bg-gradient-to-r from-orange-500 to-pink-500 text-white' 
              : 'bg-white text-gray-700 shadow-sm'} 
              rounded-3xl ${isUser ? 'rounded-br-none' : 'rounded-tl-none'} px-6 py-4">
              ${text}
            </div>
            <p class="text-xs text-orange-400/70 mt-1 ${isUser ? 'text-right' : 'ml-2'}">${time}</p>
          </div>
        </div>
      `;

      messagesContainer.insertAdjacentHTML('beforeend', html);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function toggleChat() {
      widget.classList.toggle('hidden');
      if (!widget.classList.contains('hidden') && messagesContainer.children.length === 0) {
        addWelcomeMessage();
        setTimeout(() => input.focus(), 300);
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        const replies = [
          "The sunset agrees with you 🌅",
          "That feels so warm...",
          "Sharing this golden moment with you",
          "You have such a beautiful way with words",
          "Let’s stay here a little longer..."
        ];
        addMessage(replies[Math.floor(Math.random() * replies.length)], false);
      }, 750);
    }

    toggleBtn.addEventListener('click', toggleChat);
    closeBtn.addEventListener('click', toggleChat);
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
