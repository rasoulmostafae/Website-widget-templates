<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glassmorphism Chat</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.25);
    }

    .chat-widget {
      box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.5);
    }

    .message {
      animation: glassPop 0.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes glassPop {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-zinc-900 to-black min-h-screen flex items-center justify-center">

  <!-- Floating Button -->
  <button id="chat-toggle"
    class="fixed bottom-8 right-8 w-16 h-16 glass rounded-3xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all duration-300 shadow-2xl z-50 border border-white/30">
    <i class="fa-solid fa-comment-dots text-white text-3xl"></i>
  </button>

  <!-- Chat Widget -->
  <div id="chat-widget" class="hidden fixed bottom-28 right-8 w-96 glass rounded-3xl overflow-hidden chat-widget">

    <!-- Header -->
    <div class="p-6 border-b border-white/10 flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-white/20 to-white/5 flex items-center justify-center border border-white/30">
          <i class="fa-solid fa-sparkles text-white text-3xl"></i>
        </div>
        <div>
          <h3 class="text-white font-semibold text-2xl">Codzar</h3>
          <p class="text-white/60 text-sm">Always listening • Never judging</p>
        </div>
      </div>
      <button id="close-chat" 
        class="w-10 h-10 flex items-center justify-center text-white/60 hover:text-white hover:bg-white/10 rounded-2xl transition-all">
        <i class="fa-solid fa-xmark text-2xl"></i>
      </button>
    </div>

    <!-- Messages Area -->
    <div id="chat-messages" class="h-96 p-7 overflow-y-auto space-y-6 scrollbar-thin scrollbar-thumb-white/20">
      <!-- Messages added by JS -->
    </div>

    <!-- Input -->
    <div class="p-6 border-t border-white/10">
      <div class="flex gap-3">
        <input 
          id="user-input"
          type="text" 
          placeholder="Type something beautiful..." 
          class="flex-1 bg-white/10 border border-white/20 focus:border-white/40 rounded-3xl px-6 py-4 text-white placeholder-white/40 focus:outline-none transition-all"
        />
        <button id="send-btn"
          class="w-14 h-14 bg-white text-zinc-900 rounded-3xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all shadow-inner">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const widget = document.getElementById('chat-widget');
    const closeBtn = document.getElementById('close-chat');
    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function addWelcomeMessage() {
      const welcome = `
        <div class="flex gap-4 message">
          <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-white/30 to-white/10 flex items-center justify-center flex-shrink-0 border border-white/30">
            <i class="fa-solid fa-sparkles text-white"></i>
          </div>
          <div class="glass rounded-3xl rounded-tl-none px-6 py-4 text-white max-w-[260px]">
            Hello ✨<br>
            I'm Aura.<br>
            What’s on your mind today?
          </div>
        </div>
      `;
      messagesContainer.innerHTML = welcome;
    }

    function addMessage(text, isUser) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const html = `
        <div class="flex ${isUser ? 'justify-end' : 'gap-4'} message">
          ${!isUser ? `
          <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-white/30 to-white/10 flex items-center justify-center flex-shrink-0 border border-white/30">
            <i class="fa-solid fa-sparkles text-white"></i>
          </div>` : ''}
          
          <div class="${isUser ? 'max-w-[250px]' : 'max-w-[260px]'}">
            <div class="${isUser 
              ? 'bg-white text-zinc-900' 
              : 'glass text-white'} 
              rounded-3xl ${isUser ? 'rounded-br-none' : 'rounded-tl-none'} px-6 py-4">
              ${text}
            </div>
            <p class="text-xs text-white/40 mt-1 ${isUser ? 'text-right' : 'ml-2'}">${time}</p>
          </div>
        </div>
      `;

      messagesContainer.insertAdjacentHTML('beforeend', html);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function toggleChat() {
      widget.classList.toggle('hidden');
      if (!widget.classList.contains('hidden') && messagesContainer.children.length === 0) {
        addWelcomeMessage();
        setTimeout(() => input.focus(), 200);
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      setTimeout(() => {
        const replies = [
          "I was just thinking the same thing...",
          "That’s really beautiful.",
          "Thank you for sharing that with me.",
          "You have such a gentle way with words.",
          "I’m here with you."
        ];
        addMessage(replies[Math.floor(Math.random() * replies.length)], false);
      }, 700);
    }

    toggleBtn.addEventListener('click', toggleChat);
    closeBtn.addEventListener('click', toggleChat);
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
