<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sapphire Chat Widget</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }

    .chat-widget {
      box-shadow: 0 35px 80px -20px rgba(59, 130, 246, 0.6);
    }

    .message {
      animation: messageIn 0.4s ease-out forwards;
    }

    @keyframes messageIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .gold-glow {
      box-shadow: 0 0 25px rgba(234, 179, 8, 0.5);
    }
  </style>
</head>
<body class="bg-zinc-950 min-h-screen flex items-center justify-center">

  <!-- Floating Button -->
  <button id="chat-toggle" 
    class="fixed bottom-8 right-8 w-18 h-18 bg-gradient-to-br from-blue-700 via-indigo-700 to-violet-700 rounded-3xl flex items-center justify-center shadow-2xl hover:scale-110 transition-all duration-300 group border border-white/10">
    <div class="relative">
      <i class="fa-solid fa-message text-4xl text-amber-300 group-active:rotate-12 transition-transform"></i>
      <div class="absolute -top-1 -right-1 w-5 h-5 bg-amber-400 rounded-full flex items-center justify-center">
        <span class="text-[10px] font-bold text-blue-950">✧</span>
      </div>
    </div>
  </button>

  <!-- Chat Widget -->
  <div id="chat-widget" class="hidden fixed bottom-28 right-8 w-[380px] bg-zinc-900 rounded-3xl overflow-hidden chat-widget border border-blue-500/30">

    <!-- Elegant Header -->
    <div class="bg-gradient-to-r from-blue-950 via-indigo-950 to-violet-950 p-6 relative">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 bg-gradient-to-br from-amber-400 to-yellow-300 rounded-2xl flex items-center justify-center gold-glow">
            <i class="fa-solid fa-gem text-blue-950 text-3xl"></i>
          </div>
          <div>
            <h2 class="text-white text-2xl font-semibold tracking-tighter">Codzar</h2>
            <p class="text-blue-300 text-sm flex items-center gap-2">
              <span class="w-2.5 h-2.5 bg-emerald-400 rounded-full animate-pulse"></span>
              Codzar Assistant
            </p>
          </div>
        </div>

        <button id="close-chat" 
          class="text-white/60 hover:text-white p-2 hover:bg-white/10 rounded-2xl transition-all">
          <i class="fa-solid fa-xmark text-2xl"></i>
        </button>
      </div>
    </div>

    <!-- Messages -->
    <div id="chat-messages" class="h-[420px] p-7 overflow-y-auto bg-zinc-950 space-y-7 scrollbar-thin scrollbar-thumb-blue-900">
      <!-- Messages added by JS -->
    </div>

    <!-- Input Area -->
    <div class="bg-zinc-900 p-6 border-t border-blue-900/50">
      <div class="relative">
        <input 
          id="user-input"
          type="text" 
          placeholder="Speak your mind..." 
          class="w-full bg-zinc-800 border border-blue-800 focus:border-amber-400 rounded-3xl px-7 py-5 text-white placeholder-zinc-400 focus:outline-none text-base transition-all"
        />
        <button id="send-btn"
          class="absolute right-3 top-1/2 -translate-y-1/2 bg-gradient-to-br from-amber-400 to-yellow-300 text-blue-950 w-12 h-12 rounded-3xl flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md">
          <i class="fa-solid fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>

  <script>
    const toggleBtn = document.getElementById('chat-toggle');
    const widget = document.getElementById('chat-widget');
    const closeBtn = document.getElementById('close-chat');
    const messagesContainer = document.getElementById('chat-messages');
    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    // Welcome Message
    function addWelcome() {
      const welcomeHTML = `
        <div class="flex gap-4 message">
          <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-yellow-300 rounded-2xl flex-shrink-0 flex items-center justify-center">
            <i class="fa-solid fa-gem text-blue-950"></i>
          </div>
          <div class="bg-zinc-800 rounded-3xl rounded-tl-none px-6 py-4 max-w-[280px]">
            <p class="text-white">
              Welcome to <span class="font-semibold text-amber-400">Elysium</span>.<br>
              I'm here to listen, inspire, and assist with elegance.
            </p>
          </div>
        </div>
      `;
      messagesContainer.innerHTML = welcomeHTML;
    }

    function addMessage(text, isUser) {
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      const html = `
        <div class="flex ${isUser ? 'justify-end' : 'gap-4'} message">
          ${!isUser ? `
          <div class="w-10 h-10 bg-gradient-to-br from-amber-400 to-yellow-300 rounded-2xl flex-shrink-0 flex items-center justify-center">
            <i class="fa-solid fa-gem text-blue-950"></i>
          </div>` : ''}
          
          <div class="${isUser ? 'max-w-[260px]' : 'max-w-[280px]'}">
            <div class="${isUser 
              ? 'bg-gradient-to-r from-indigo-600 to-blue-600 text-white' 
              : 'bg-zinc-800 text-white'} 
              rounded-3xl ${isUser ? 'rounded-br-none' : 'rounded-tl-none'} px-6 py-4">
              ${text}
            </div>
            <p class="text-xs text-zinc-500 mt-1 ${isUser ? 'text-right' : 'ml-2'}">${time}</p>
          </div>
        </div>
      `;

      messagesContainer.insertAdjacentHTML('beforeend', html);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function toggleChat() {
      widget.classList.toggle('hidden');
      if (!widget.classList.contains('hidden') && messagesContainer.children.length === 0) {
        addWelcome();
        setTimeout(() => input.focus(), 300);
      }
    }

    function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, true);
      input.value = '';

      // Simulated reply
      setTimeout(() => {
        const replies = [
          "Your words carry such grace.",
          "I was hoping you'd bring this up.",
          "Allow me to offer a thoughtful perspective...",
          "Beautiful question. Here's my reflection...",
          "With pleasure."
        ];
        addMessage(replies[Math.floor(Math.random() * replies.length)], false);
      }, 650);
    }

    // Event Listeners
    toggleBtn.addEventListener('click', toggleChat);
    closeBtn.addEventListener('click', toggleChat);
    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
